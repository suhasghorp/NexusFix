codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down

  # Branch coverage is the TICKET_497 gate dimension, not line coverage. The
  # measured merged (SIMD off + on) branch rate is 71.7% overall; the project
  # target is anchored at achieved-minus-2% so the gate lands green and absorbs
  # the run-to-run template-instantiation jitter in branch totals.
  status:
    project:
      default:
        target: 70%
        threshold: 2%
        if_ci_failed: error

    patch:
      default:
        target: 80%
        threshold: 5%

  # Per-module coverage targets
  flags:
    parser:
      paths:
        - include/nexusfix/parser/
      carryforward: true
    session:
      paths:
        - include/nexusfix/session/
      carryforward: true
    memory:
      paths:
        - include/nexusfix/memory/
      carryforward: true
    types:
      paths:
        - include/nexusfix/types/
      carryforward: true
    messages:
      paths:
        - include/nexusfix/messages/
      carryforward: true
    transport:
      paths:
        - include/nexusfix/transport/
      carryforward: true
    util:
      paths:
        - include/nexusfix/util/
      carryforward: true

ignore:
  - tests/
  - benchmarks/
  - examples/
  - build/
  - _deps/

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
